apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: optimizator-cluster
servers: 1
agents: 1
image: rancher/k3s:v1.27.4-k3s1
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
