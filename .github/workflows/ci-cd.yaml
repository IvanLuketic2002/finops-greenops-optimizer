name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  devsecops-analysis:
    name: Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-path: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8 Linting
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          # exit-zero treats all errors as warnings to not block, but we want strict standards!
          flake8 src/optimizer-api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/optimizer-api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Trivy FS Scan (IaC & Code Security)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          hide-progress: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Blokira pipeline ako nađe High ili Critical ranjivosti u kodu/konfiguraciji

  build-and-scan-image:
    name: Build & Scan Docker Image
    needs: devsecops-analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-qemu-action@v3

      - name: Build Docker Image Locally
        run: |
          docker build -t optimizer-api:${{ github.sha }} src/optimizer-api/

      - name: Run Trivy Vulnerability Scanner on Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'optimizer-api:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true # Ne obaraj build za ranjivosti koje još uvek nemaju zakrpu
          exit-code: '1'
